<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <title>Login - Freelance Observability & Monitoring Stack Consultant</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <style>
    /* Specific auth styles aligning with previous preferences */
    .auth-bg-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
    }

    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }

    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-color);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .social-btn:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--secondary-color);
      transform: translateY(-2px);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-light);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider::before {
      margin-right: .5em;
    }

    .divider::after {
      margin-left: .5em;
    }

    .password-container {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-light);
    }

    [dir="rtl"] .password-toggle {
      right: auto;
      left: 15px;
    }
  </style>
</head>

<body>

  <div class="auth-page">
    <div class="auth-bg-particles"></div>

    <div class="auth-controls">
      <button class="btn-icon theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
      <button class="btn-icon rtl-toggle" aria-label="Toggle RTL"><i class="fas fa-arrow-right-arrow-left"></i></button>
    </div>

    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="brand" style="justify-content: center; margin-bottom: 1rem;">
          <i class="fas fa-chart-line"></i> SRE Consult
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to access your dashboard</p>
      </div>

      <form action="dashboard.html" method="GET">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-container">
            <input type="password" id="password" class="form-control" required placeholder="••••••••">
            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
          </div>
        </div>

        <div class="form-group auth-options">
          <div class="remember-me">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Sign In</button>
      </form>

      <div class="divider">OR</div>

      <button class="social-btn"><i class="fab fa-google" style="color: #ea4335;"></i> Continue with Google</button>
      <button class="social-btn"><i class="fab fa-apple"></i> Continue with Apple</button>

      <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
        Don't have an account? <a href="register.html"
          style="color: var(--secondary-color); font-weight: 600; text-decoration: none;">Create Account</a>
      </p>


    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    // Password visibility toggle
    document.addEventListener('DOMContentLoaded', () => {
      const togglePassword = document.querySelector('#togglePassword');
      const password = document.querySelector('#password');

      if (togglePassword && password) {
        togglePassword.addEventListener('click', function (e) {
          const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
          password.setAttribute('type', type);
          this.classList.toggle('fa-eye-slash');
        });
      }
    });
  </script>
</body>

</html>
