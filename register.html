<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Freelance Observability & Monitoring Stack Consultant</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <style>
    .auth-bg-particles {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
      background: radial-gradient(circle at center, rgba(16,185,129,0.05) 0%, transparent 70%);
    }
    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }
    .social-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);
      background: transparent; color: var(--text-color); font-weight: 500; cursor: pointer;
      transition: all 0.3s ease; margin-bottom: 1rem;
    }
    .social-btn:hover { background: rgba(16,185,129,0.1); border-color: var(--accent-color); transform: translateY(-2px); }
    .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: var(--text-light); }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
    .divider::before { margin-right: .5em; }
    .divider::after { margin-left: .5em; }
    .password-container { position: relative; }
    .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-light); }
    [dir="rtl"] .password-toggle { right: auto; left: 15px; }
  </style>
</head>
<body>
  
  <div class="auth-page">
    <div class="auth-bg-particles"></div>
    
    <div class="auth-card tilt-card" style="transform-style: preserve-3d; transition: transform 0.5s;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="brand" style="justify-content: center; margin-bottom: 1rem;">
          <i class="fas fa-chart-line"></i> SRE Consult
        </a>
        <h2>Create Account</h2>
        <p>Join the elite observability platform</p>
      </div>

      <button class="social-btn"><i class="fab fa-google" style="color: #ea4335;"></i> Sign up with Google</button>
      <button class="social-btn"><i class="fab fa-apple"></i> Sign up with Apple</button>
      
      <div class="divider">OR</div>

      <form action="dashboard.html" method="GET">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-container">
            <input type="password" id="password" class="form-control" required placeholder="••••••••">
            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
          </div>
        </div>
        
        <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px;">
          <input type="checkbox" id="terms" required style="accent-color: var(--secondary-color); margin-top: 5px;">
          <label for="terms" style="font-size: 0.85rem; color: var(--text-light); cursor: pointer; line-height: 1.4;">
            I agree to the <a href="#" style="color: var(--secondary-color); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--secondary-color); text-decoration: none;">Privacy Policy</a>.
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; background: linear-gradient(135deg, var(--accent-color), #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">Create Account</button>
      </form>

      <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
        Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: 600; text-decoration: none;">Sign In</a>
      </p>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const togglePassword = document.querySelector('#togglePassword');
      const password = document.querySelector('#password');

      if(togglePassword && password) {
        togglePassword.addEventListener('click', function (e) {
          const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
          password.setAttribute('type', type);
          this.classList.toggle('fa-eye-slash');
        });
      }
    });
  </script>
</body>
</html>
